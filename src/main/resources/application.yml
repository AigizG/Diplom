spring:
  application:
    name: active-leisure
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/active_leisure}
    username: ${DB_USERNAME:active}
    password: ${DB_PASSWORD:active}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
